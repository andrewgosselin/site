steps:
  - name: docker-build-pr
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: andrewgosselin/portfolio
      dockerfile: Dockerfile
      context: .
      dry_run: true
    when:
      event:
        - pull_request

  - name: docker-publish
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: andrewgosselin/portfolio
      dockerfile: Dockerfile
      context: .
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
      tags:
        - latest
        - ${CI_COMMIT_SHA}
      auto_tag: true
    when:
      event:
        - push
      branch:
        - master

  - name: docker-publish-tag-
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: andrewgosselin/portfolio
      dockerfile: Dockerfile
      context: .
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_token
      auto_tag: true
    when:
      event:
        - tag
